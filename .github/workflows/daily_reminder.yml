name: Daily Slack Reminder And Analysis

on:
  schedule:
    # 23:00 UTC = 08:00 KST (next day)
    - cron: '0 23 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  remind-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send reminder to Slack
        env:
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          APP_URL: https://ligibiometrics.streamlit.app/
          TZ: Asia/Seoul
        run: python batch_reminder.py --slack --no-save

      - name: Send trend analysis to Slack
        env:
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APP_URL: https://ligibiometrics.streamlit.app/
          TZ: Asia/Seoul
        run: python batch_analysis.py --slack --no-save --no-print
